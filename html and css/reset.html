<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Reset Password</title>

            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
            <link rel="stylesheet" href="styles.css">

        </head>

        <body class="auth-bg">

            <div class="container">

                <div class="auth-card">

                    <h3 class="text-center mb-4">Reset Password</h3>

                    <form>

                        <div class="mb">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" placeholder="Enter new password" required>
                        </div>

                        <div class="mb">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" placeholder="Confirm new password" required>
                        </div>

                        <button class="btn btn-primary" formaction="login page.html">Update Password</button>

                    </form>
                </div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        </body>
    </html>
