<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Register</title>

            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
            <link rel="stylesheet" href="styles.css">
                
        </head>

        <body class="auth-bg">

            <div class="container">

                <div class="auth-card">

                    <h3 class="text-center mb-4">Register</h3>

                    <form>

                        <div class="mb">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" placeholder="Enter your name" required>
                        </div>

                        <div class="mb">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Enter your email" required>
                        </div>

                        <div class="mb">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" placeholder="Enter your phone number" required>
                        </div>

                        <div class="mb">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="Create a password" required>
                        </div>

                        <div class="mb">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" placeholder="Confirm your password" required>
                        </div>

                        <button class="btn btn-success" formaction="login page.html">Register</button>

                        <div class="text-center mt-3">
                            <a href="login page.html">Already have an account?</a>
                        </div>

                    </form>

                </div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        </body>
    </html>
